global:
  scrape_interval: 15s

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # Interfaces de rede
  - job_name: switch-interfaces

    metrics_path: /snmp

    params:
      module: [if_mib]

    static_configs:
      - targets:
          - virtual-switch

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: snmp-exporter:9116

  # CPU, RAM e Disco
  - job_name: switch-system

    metrics_path: /snmp

    params:
      module: [system]

    static_configs:
      - targets:
          - virtual-switch

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: snmp-exporter:9116